app-id: org.fluxer.World
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk

# Electron ships its own Chromium; use the generic Electron BaseApp so we
# get the required libraries (libnss, libdrm, Mesa, etc.) without pulling in
# the full GNOME or KDE stack.
base: org.electronjs.Electron2.BaseApp
base-version: '24.08'

command: fluxer-world

# ── Sandbox permissions ───────────────────────────────────────────────────────
finish-args:
  # Display
  - --share=ipc
  - --socket=x11
  - --socket=wayland
  # Network (the entire app is a web client)
  - --share=network
  # Sound
  - --socket=pulseaudio
  # Notifications via the host portal
  - --talk-name=org.freedesktop.Notifications
  # System tray via StatusNotifierItem (KDE/xfce/etc.)
  # GNOME requires the AppIndicator shell extension; app still runs without it.
  - --talk-name=org.kde.StatusNotifierWatcher
  - --talk-name=com.canonical.indicator.application
  - --talk-name=org.freedesktop.portal.Notification
  # Auto-start / login item
  - --talk-name=org.freedesktop.portal.Background
  # File system: only user data dir
  - --filesystem=xdg-run/dconf
  - --filesystem=~/.config/dconf:ro
  - --talk-name=ca.desrt.dconf
  - --env=DCONF_USER_CONFIG_DIR=.config/dconf
  # Electron needs this to locate its own GPU process inside the Flatpak.
  - --device=dri
  # --no-sandbox is required because Chrome's setuid sandbox conflicts with
  # Bubblewrap.  The Flatpak container itself is the sandbox boundary.
  - --env=ELECTRON_OZONE_PLATFORM_HINT=auto

modules:
  - name: fluxer-world
    buildsystem: simple
    build-commands:
      # Unpack the upstream tar.gz (produced by electron-builder --linux tar.gz)
      - install -dm 755 /app/fluxer-world
      - tar -xzf fluxer-world.tar.gz -C /app/fluxer-world --strip-components=1

      # Wrapper script that disables Chrome's setuid sandbox (Bubblewrap is
      # the real sandbox here) and sets the app-id for proper Wayland XDG
      # desktop integration.
      - |
        cat > /app/bin/fluxer-world <<'EOF'
        #!/bin/sh
        export TMPDIR="${XDG_RUNTIME_DIR}/app/${FLATPAK_ID}"
        exec /app/fluxer-world/fluxer-world \
          --no-sandbox \
          --enable-features=UseOzonePlatform,WaylandWindowDecorations \
          "$@"
        EOF
      - chmod +x /app/bin/fluxer-world

      # Desktop integration
      - install -Dm 644 org.fluxer.World.desktop
          /app/share/applications/org.fluxer.World.desktop
      - install -Dm 644 org.fluxer.World.metainfo.xml
          /app/share/metainfo/org.fluxer.World.metainfo.xml

      # Icons (source must be present in the flatpak/ directory at build time)
      - install -Dm 644 icons/icon_16.png
          /app/share/icons/hicolor/16x16/apps/org.fluxer.World.png
      - install -Dm 644 icons/icon_32.png
          /app/share/icons/hicolor/32x32/apps/org.fluxer.World.png
      - install -Dm 644 icons/icon_48.png
          /app/share/icons/hicolor/48x48/apps/org.fluxer.World.png
      - install -Dm 644 icons/icon_64.png
          /app/share/icons/hicolor/64x64/apps/org.fluxer.World.png
      - install -Dm 644 icons/icon_128.png
          /app/share/icons/hicolor/128x128/apps/org.fluxer.World.png
      - install -Dm 644 icons/icon_256.png
          /app/share/icons/hicolor/256x256/apps/org.fluxer.World.png
      - install -Dm 644 icons/icon_512.png
          /app/share/icons/hicolor/512x512/apps/org.fluxer.World.png

    sources:
      # Replace the url/sha256 with your actual release artifact.
      # Generate sha256 with: sha256sum Fluxer\ World-*-linux-x64.tar.gz
      - type: file
        url: https://github.com/fluxerworld/fluxerworld/releases/download/v1.0.0/Fluxer World-1.0.0-linux-x64.tar.gz
        sha256: REPLACE_WITH_ACTUAL_SHA256
        dest-filename: fluxer-world.tar.gz

      - type: file
        path: org.fluxer.World.desktop

      - type: file
        path: org.fluxer.World.metainfo.xml

      # Icon sizes – generate from your master icon.png with ImageMagick:
      # for s in 16 32 48 64 128 256 512; do
      #   convert assets/icons/icon.png -resize ${s}x${s} flatpak/icons/icon_${s}.png
      # done
      - type: dir
        path: icons
        dest: icons
