name: Build Desktop Clients

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  # ── Windows ──────────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build (NSIS + portable)
        run: npm run build:win
        env:
          # Code-signing: set these secrets in repo Settings → Secrets.
          # CSC_LINK:         ${{ secrets.WIN_CSC_LINK }}
          # CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: windows-installers
          path: |
            release/*.exe
          retention-days: 30

  # ── macOS ─────────────────────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build (dmg x64)
        run: npm run compile && npx electron-builder --mac --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Detach DMG volumes
        run: |
          hdiutil detach /Volumes/FluxerWorld-* 2>/dev/null || true
          sleep 2

      - name: Build (dmg arm64)
        run: npx electron-builder --mac --arm64
        env:
          # Notarisation: set these secrets to enable notarisation.
          # APPLE_ID:                   ${{ secrets.APPLE_ID }}
          # APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          # APPLE_TEAM_ID:              ${{ secrets.APPLE_TEAM_ID }}
          # CSC_LINK:                   ${{ secrets.MAC_CSC_LINK }}
          # CSC_KEY_PASSWORD:           ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: release/*.dmg
          retention-days: 30

  # ── Linux tar.gz ──────────────────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build (tar.gz)
        run: npm run build:linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: linux-tarballs
          path: release/*.tar.gz
          retention-days: 30

  # ── Flatpak ───────────────────────────────────────────────────────────────────
  build-flatpak:
    runs-on: ubuntu-latest
    needs: build-linux
    container:
      image: bilelmoussaoui/flatpak-github-actions:freedesktop-24.08
      options: --privileged

    steps:
      - uses: actions/checkout@v4

      # Grab the tar.gz produced by the linux job
      - uses: actions/download-artifact@v4
        with:
          name: linux-tarballs
          path: flatpak-tarballs

      # Inside the container we're already root; sudo is unavailable/broken.
      # Pre-install imagemagick so flatpak-github-actions doesn't try sudo.
      - name: Install imagemagick
        run: dnf install -y ImageMagick

      - name: Patch manifest with actual tarball path
        run: |
          TARBALL=$(ls flatpak-tarballs/*.tar.gz | head -1)
          cp "$TARBALL" flatpak/fluxer-world.tar.gz
          sed -i \
            's|path: ../release/.*|path: fluxer-world.tar.gz|' \
            flatpak/org.fluxer.World.yml

      # Icons are pre-committed in flatpak/icons/ — no generation needed.

      - uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: fluxer-world.flatpak
          manifest-path: flatpak/org.fluxer.World.yml
          cache-key: flatpak-builder-${{ github.sha }}
          upload-artifact: false

      - uses: actions/upload-artifact@v4
        with:
          name: flatpak-bundle
          path: fluxer-world.flatpak
          retention-days: 30

  # ── Android APK ───────────────────────────────────────────────────────────────
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Decode keystore
        id: keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        working-directory: android
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            printf '%s' "$ANDROID_KEYSTORE_BASE64" | tr -d '[:space:]' | base64 -d > app/release.keystore
            echo "keystore_path=$(pwd)/app/release.keystore" >> $GITHUB_OUTPUT
          fi

      - name: Build release APK
        run: ./gradlew assembleRelease --stacktrace
        working-directory: android
        env:
          ANDROID_KEYSTORE_PATH: ${{ steps.keystore.outputs.keystore_path }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 30

  # ── iOS IPA ───────────────────────────────────────────────────────────────────
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build (unsigned archive)
        run: |
          xcodebuild \
            -project ios/FluxerWorld.xcodeproj \
            -scheme FluxerWorld \
            -configuration Release \
            -sdk iphoneos \
            -archivePath ios/build/FluxerWorld.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            archive

      - name: Export IPA
        run: |
          mkdir -p ios/build/ipa
          xcodebuild \
            -exportArchive \
            -archivePath ios/build/FluxerWorld.xcarchive \
            -exportPath ios/build/ipa \
            -exportOptionsPlist ios/ExportOptions.plist \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
          || true
          # Fallback: package the .app directly if export fails without signing
          if [ ! -f ios/build/ipa/*.ipa ]; then
            cd ios/build/FluxerWorld.xcarchive/Products/Applications
            mkdir -p Payload
            cp -r FluxerWorld.app Payload/
            zip -r ../../../ipa/FluxerWorld.ipa Payload/
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: ios/build/ipa/*.ipa
          retention-days: 30

  # ── Create GitHub Release ─────────────────────────────────────────────────────
  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-windows, build-macos, build-linux, build-flatpak, build-android, build-ios]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: windows-installers
          path: artifacts/windows
      - uses: actions/download-artifact@v4
        with:
          name: macos-dmg
          path: artifacts/macos
      - uses: actions/download-artifact@v4
        with:
          name: linux-tarballs
          path: artifacts/linux
      - uses: actions/download-artifact@v4
        with:
          name: flatpak-bundle
          path: artifacts/flatpak
      - uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: artifacts/android
      - uses: actions/download-artifact@v4
        with:
          name: ios-ipa
          path: artifacts/ios

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
