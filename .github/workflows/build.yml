name: Build Desktop Clients

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  # ── Windows ──────────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build (NSIS + portable)
        run: npm run build:win
        env:
          # Code-signing: set these secrets in repo Settings → Secrets.
          # CSC_LINK:         ${{ secrets.WIN_CSC_LINK }}
          # CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: windows-installers
          path: |
            release/*.exe
          retention-days: 30

  # ── macOS ─────────────────────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build (dmg – universal / arm64 + x64)
        run: npm run build:mac
        env:
          # Notarisation: set these secrets to enable notarisation.
          # APPLE_ID:                   ${{ secrets.APPLE_ID }}
          # APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          # APPLE_TEAM_ID:              ${{ secrets.APPLE_TEAM_ID }}
          # CSC_LINK:                   ${{ secrets.MAC_CSC_LINK }}
          # CSC_KEY_PASSWORD:           ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: release/*.dmg
          retention-days: 30

  # ── Linux tar.gz ──────────────────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build (tar.gz)
        run: npm run build:linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: linux-tarballs
          path: release/*.tar.gz
          retention-days: 30

  # ── Flatpak ───────────────────────────────────────────────────────────────────
  build-flatpak:
    runs-on: ubuntu-latest
    needs: build-linux
    container:
      image: bilelmoussaoui/flatpak-github-actions:freedesktop-24.08
      options: --privileged

    steps:
      - uses: actions/checkout@v4

      # Grab the tar.gz produced by the linux job
      - uses: actions/download-artifact@v4
        with:
          name: linux-tarballs
          path: flatpak-tarballs

      - name: Patch manifest with actual tarball path + sha256
        run: |
          TARBALL=$(ls flatpak-tarballs/*.tar.gz | head -1)
          SHA256=$(sha256sum "$TARBALL" | awk '{print $1}')
          cp "$TARBALL" flatpak/fluxer-world.tar.gz
          sed -i \
            -e "s|url: .*tar.gz|url: file:///$(pwd)/flatpak/fluxer-world.tar.gz|" \
            -e "s|sha256: REPLACE_WITH_ACTUAL_SHA256|sha256: ${SHA256}|" \
            flatpak/org.fluxer.World.yml

      # Generate scaled icons from master source
      - name: Generate Flatpak icons
        run: |
          sudo apt-get install -y imagemagick
          mkdir -p flatpak/icons
          for s in 16 32 48 64 128 256 512; do
            convert assets/icons/icon.png -resize ${s}x${s} \
              flatpak/icons/icon_${s}.png
          done

      - uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: fluxer-world.flatpak
          manifest-path: flatpak/org.fluxer.World.yml
          cache-key: flatpak-builder-${{ github.sha }}

      - uses: actions/upload-artifact@v4
        with:
          name: flatpak-bundle
          path: fluxer-world.flatpak
          retention-days: 30

  # ── Create GitHub Release ─────────────────────────────────────────────────────
  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-windows, build-macos, build-linux, build-flatpak]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
